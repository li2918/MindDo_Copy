<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | 学员注册</title>
  <style>
    :root {
      --bg: #05070c;
      --bg-2: #0a1222;
      --card: rgba(12, 18, 32, 0.72);
      --line: rgba(0, 255, 247, 0.25);
      --primary: #00f6ff;
      --text: #e7f4ff;
      --muted: #97adc9;
      --success: #5bffa4;
      --error: #ff7a8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(63, 123, 255, 0.2), transparent 40%),
        radial-gradient(circle at 86% 90%, rgba(0, 246, 255, 0.16), transparent 42%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 255, 247, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 247, 0.07) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip,
    .lang-btn,
    .submit-btn,
    .oauth-btn {
      border: 1px solid rgba(0, 246, 255, 0.35);
      background: rgba(0, 246, 255, 0.08);
      color: #bdfdff;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .chip:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .submit-btn:hover,
    .oauth-btn:hover {
      background: rgba(0, 246, 255, 0.2);
      color: #ecfeff;
      box-shadow: 0 0 12px rgba(0, 246, 255, 0.3);
    }

    .lang-switch { display: flex; gap: 10px; }

    .hero,
    .card {
      background: linear-gradient(160deg, rgba(16, 28, 48, 0.86), rgba(8, 14, 25, 0.88));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow:
        inset 0 0 24px rgba(0, 246, 255, 0.08),
        0 16px 40px rgba(0, 0, 0, 0.5);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(0, 246, 255, 0.35);
    }

    .hero p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card {
      padding: 20px;
    }

    h2 {
      margin: 0 0 10px;
      color: #d2ecff;
      font-size: 20px;
    }

    .stack { display: grid; gap: 12px; }

    .oauth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .oauth-btn {
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      padding: 10px 12px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8eb4d6;
      font-size: 12px;
      margin: 4px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(0, 246, 255, 0.2);
    }

    form { display: grid; gap: 12px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #c5dbef;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(0, 246, 255, 0.25);
      background: rgba(3, 10, 20, 0.7);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(0, 246, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(0, 246, 255, 0.15);
    }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .consent input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
    }

    .submit-btn {
      justify-self: start;
      min-width: 180px;
      border-radius: 10px;
    }

    .result {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      display: none;
    }

    .result.success {
      display: block;
      border: 1px solid rgba(91, 255, 164, 0.4);
      background: rgba(91, 255, 164, 0.1);
      color: var(--success);
    }

    .result.error {
      display: block;
      border: 1px solid rgba(255, 122, 138, 0.4);
      background: rgba(255, 122, 138, 0.1);
      color: var(--error);
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .row, .oauth-row { grid-template-columns: 1fr; }
      .topbar { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div class="nav-links">
        <a class="chip" href="index.html" data-i18n="backFlow"></a>
        <a class="chip" href="trial.html" data-i18n="backTrial"></a>
      </div>
      <div class="lang-switch" aria-label="language switch">
        <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
        <button class="lang-btn" type="button" data-set-lang="en">English</button>
      </div>
    </div>

    <section class="hero">
      <h1 data-i18n="pageTitle"></h1>
      <p data-i18n="pageDesc"></p>
    </section>

    <section class="grid">
      <article class="card stack">
        <h2 data-i18n="authTitle"></h2>
        <p class="muted" data-i18n="authDesc"></p>

        <div class="oauth-row">
          <button type="button" class="oauth-btn" id="googleBtn">Google</button>
          <button type="button" class="oauth-btn" id="microsoftBtn">Microsoft</button>
        </div>

        <div class="divider" data-i18n="or"></div>

        <form id="signupForm" novalidate>
          <div class="row">
            <div>
              <label for="studentName" data-i18n="studentName"></label>
              <input id="studentName" name="studentName" type="text" required />
            </div>
            <div>
              <label for="email" data-i18n="email"></label>
              <input id="email" name="email" type="email" required />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="password" data-i18n="password"></label>
              <input id="password" name="password" type="password" required />
            </div>
            <div>
              <label for="confirmPassword" data-i18n="confirmPassword"></label>
              <input id="confirmPassword" name="confirmPassword" type="password" required />
            </div>
          </div>

          <label class="consent">
            <input id="consent" name="consent" type="checkbox" required />
            <span data-i18n="consent"></span>
          </label>

          <button class="submit-btn" type="submit" data-i18n="submit"></button>
          <div id="submitResult" class="result" role="status" aria-live="polite"></div>
        </form>
      </article>

      <article class="card stack">
        <h2 data-i18n="rightTitle"></h2>
        <p class="muted" data-i18n="rightDesc"></p>
        <ul class="tips" id="tips"></ul>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var CONFIG = {
        emailApiUrl: "",
        oauth: {
          google: "",
          microsoft: ""
        },
        redirectDelayMs: 1500
      };

      var I18N = {
        "zh-CN": {
          backFlow: "返回流程总览",
          backTrial: "返回 Trial 页面",
          pageTitle: "Sign Up 注册页面",
          pageDesc: "注册成功后，系统将发送注册成功邮件，并自动跳转到评估页面。",
          authTitle: "创建学员账户",
          authDesc: "支持邮箱注册、Google 登录和 Microsoft 登录。",
          or: "或使用邮箱注册",
          studentName: "学生姓名",
          email: "邮箱",
          password: "密码",
          confirmPassword: "确认密码",
          consent: "我同意接收注册成功邮件，并用于后续学习评估通知。",
          submit: "完成注册并进入评估",
          rightTitle: "流程说明",
          rightDesc: "这是业务流程中的通用注册入口，适用于无需试课直接入评估的场景。",
          tips: [
            "注册成功后默认跳转至 assessment 评估页面。",
            "可在 CONFIG.emailApiUrl 接入真实邮件服务。",
            "可在 CONFIG.oauth 中填入 Google/Microsoft OAuth URL。"
          ],
          invalid: "请填写完整信息，且两次密码保持一致（至少6位）。",
          emailInvalid: "请输入有效的邮箱地址。",
          success: "注册成功，邮件已发送，正在跳转评估页面...",
          oauthSuccess: "登录成功，正在发送邮件并跳转评估页面...",
          failed: "注册流程失败，请稍后重试。"
        },
        en: {
          backFlow: "Back To Workflow",
          backTrial: "Back To Trial",
          pageTitle: "Sign Up Page",
          pageDesc: "After successful sign-up, a confirmation email is sent and users are redirected to the assessment page.",
          authTitle: "Create Student Account",
          authDesc: "Supports email sign-up, Google login, and Microsoft login.",
          or: "or sign up with email",
          studentName: "Student Name",
          email: "Email",
          password: "Password",
          confirmPassword: "Confirm Password",
          consent: "I agree to receive registration confirmation emails and assessment notifications.",
          submit: "Sign Up And Start Assessment",
          rightTitle: "Process Notes",
          rightDesc: "This is a general registration entry for scenarios where trial classes are optional.",
          tips: [
            "Successful sign-up redirects to the assessment page.",
            "Set CONFIG.emailApiUrl to connect a real email service.",
            "Set CONFIG.oauth URLs for Google and Microsoft OAuth."
          ],
          invalid: "Please complete all fields and keep both passwords matched (min 6 chars).",
          emailInvalid: "Please enter a valid email address.",
          success: "Sign-up successful. Confirmation email sent. Redirecting to assessment...",
          oauthSuccess: "Login successful. Sending email and redirecting to assessment...",
          failed: "Sign-up flow failed. Please try again later."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var form = document.getElementById("signupForm");
      var result = document.getElementById("submitResult");
      var tips = document.getElementById("tips");
      var googleBtn = document.getElementById("googleBtn");
      var microsoftBtn = document.getElementById("microsoftBtn");

      function currentLang() {
        return html.getAttribute("lang") === "en" ? "en" : "zh-CN";
      }

      function setResult(kind, text) {
        result.className = "result " + kind;
        result.textContent = text;
      }

      function setLang(lang) {
        var data = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = data.pageTitle + " | Sign Up";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (data[key]) {
            el.textContent = data[key];
          }
        });

        tips.innerHTML = data.tips.map(function (item) {
          return "<li>" + item + "</li>";
        }).join("");

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });

        result.className = "result";
        result.textContent = "";
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function saveUser(user) {
        var key = "minddo_signup_users";
        var users = JSON.parse(localStorage.getItem(key) || "[]");
        users.push(user);
        localStorage.setItem(key, JSON.stringify(users));
      }

      function sendRegistrationEmail(payload) {
        if (!CONFIG.emailApiUrl) {
          return Promise.resolve({ mocked: true });
        }

        return fetch(CONFIG.emailApiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }).then(function (res) {
          if (!res.ok) {
            throw new Error("Email API error");
          }
          return res.json().catch(function () { return {}; });
        });
      }

      function redirectToAssessment(name, email) {
        var target = "assessment.html?name=" + encodeURIComponent(name || "") + "&email=" + encodeURIComponent(email || "");
        setTimeout(function () {
          window.location.href = target;
        }, CONFIG.redirectDelayMs);
      }

      function handleOAuth(provider) {
        var data = I18N[currentLang()];
        var oauthUrl = CONFIG.oauth[provider];

        if (oauthUrl) {
          window.location.href = oauthUrl;
          return;
        }

        var fakeName = provider === "google" ? "Google User" : "Microsoft User";
        var fakeEmail = provider === "google" ? "google.user@example.com" : "microsoft.user@example.com";

        saveUser({
          provider: provider,
          studentName: fakeName,
          email: fakeEmail,
          createdAt: new Date().toISOString()
        });

        setResult("success", data.oauthSuccess);
        sendRegistrationEmail({
          to: fakeEmail,
          name: fakeName,
          lang: currentLang(),
          source: provider
        }).catch(function () {
          // keep redirect path even if email API is unavailable
        }).finally(function () {
          redirectToAssessment(fakeName, fakeEmail);
        });
      }

      var savedLang = localStorage.getItem("minddo_lang");
      setLang(savedLang === "en" ? "en" : "zh-CN");

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      googleBtn.addEventListener("click", function () {
        handleOAuth("google");
      });

      microsoftBtn.addEventListener("click", function () {
        handleOAuth("microsoft");
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var data = I18N[currentLang()];

        var studentName = form.studentName.value.trim();
        var email = form.email.value.trim();
        var password = form.password.value;
        var confirmPassword = form.confirmPassword.value;
        var consent = form.consent.checked;

        if (!studentName || !email || !password || !confirmPassword || !consent || password.length < 6 || password !== confirmPassword) {
          setResult("error", data.invalid);
          return;
        }

        if (!isValidEmail(email)) {
          setResult("error", data.emailInvalid);
          return;
        }

        var userRecord = {
          provider: "email",
          studentName: studentName,
          email: email,
          createdAt: new Date().toISOString()
        };
        saveUser(userRecord);

        sendRegistrationEmail({
          to: email,
          name: studentName,
          lang: currentLang(),
          source: "signup-form"
        }).then(function () {
          setResult("success", data.success);
          redirectToAssessment(studentName, email);
        }).catch(function () {
          setResult("error", data.failed);
        });
      });
    })();
  </script>
</body>
</html>
