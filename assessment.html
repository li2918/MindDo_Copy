<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment | 学习评估</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg-soft: #fffaf2;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --line-strong: rgba(208, 129, 36, 0.3);
      --primary: #f0a11f;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --success: #6f8f57;
      --error: #c46a4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 208, 118, 0.16), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(179, 76, 14, 0.08), transparent 28%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 252, 247, 0.82);
      box-shadow: 0 18px 48px rgba(123, 72, 24, 0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
    }

    .brand-copy strong {
      font-size: 19px;
      color: var(--primary-deep);
    }

    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip,
    .lang-btn,
    .submit-btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .chip:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .submit-btn:hover {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
      color: var(--primary-deep);
    }

    .lang-switch { display: flex; gap: 10px; }

    .hero,
    .card {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(252, 244, 232, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(123, 72, 24, 0.08);
      padding: 22px;
    }

    .hero { margin-bottom: 16px; }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 34px);
      color: var(--primary-deep);
    }

    h2 {
      margin: 0 0 10px;
      color: var(--primary-deep);
      font-size: 20px;
    }

    p { margin: 0; }
    .muted { color: var(--muted); line-height: 1.6; }

    form { display: grid; gap: 12px; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #7b5b43;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(151, 84, 21, 0.16);
      background: rgba(255, 252, 247, 0.88);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea { min-height: 90px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(208, 129, 36, 0.54);
      box-shadow: 0 0 0 4px rgba(255, 204, 97, 0.2);
    }

    .result {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 14px;
      display: none;
    }

    .result.success {
      display: block;
      border: 1px solid rgba(111, 143, 87, 0.28);
      background: rgba(111, 143, 87, 0.1);
      color: var(--success);
    }

    .result.error {
      display: block;
      border: 1px solid rgba(196, 106, 77, 0.28);
      background: rgba(196, 106, 77, 0.1);
      color: var(--error);
    }

    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .row { grid-template-columns: 1fr; }
      .topbar {
        justify-content: center;
        border-radius: 18px;
      }
      .toolbar {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="toolbar">
        <a class="chip" href="index.html" data-i18n="backFlow"></a>
        <a class="chip" href="trial.html" data-i18n="goTrial"></a>
        <a class="chip" href="course-selection.html" data-i18n="goCourseSelection"></a>
        <a class="chip" href="course-system.html" data-i18n="goCourseSystem"></a>
        <a class="chip" href="semester-report.html" data-i18n="goSemesterReport"></a>
        <a class="chip" href="dashboard.html" data-i18n="goDashboard"></a>
        <a class="chip" href="signup.html" data-i18n="backSignup"></a>
        <div class="lang-switch">
          <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
          <button class="lang-btn" type="button" data-set-lang="en">English</button>
        </div>
      </div>
    </div>

    <section class="hero">
      <h1 data-i18n="title"></h1>
      <p class="muted" id="welcomeText"></p>
    </section>

    <section class="card">
      <h2 data-i18n="formTitle"></h2>
      <p class="muted" data-i18n="formDesc"></p>

      <form id="assessmentForm" novalidate>
        <div class="row">
          <div>
            <label for="level" data-i18n="level"></label>
            <select id="level" name="level" required></select>
          </div>
          <div>
            <label for="goal" data-i18n="goal"></label>
            <select id="goal" name="goal" required></select>
          </div>
        </div>

        <div>
          <label for="notes" data-i18n="notes"></label>
          <textarea id="notes" name="notes"></textarea>
        </div>

        <button class="submit-btn" type="submit" data-i18n="submit"></button>
        <div id="result" class="result" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var I18N = {
        "zh-CN": {
          backFlow: "返回流程总览",
          goTrial: "前往 Trial",
          goCourseSelection: "前往选课",
          goCourseSystem: "查看课程体系",
          goSemesterReport: "查看学期报告",
          goDashboard: "前往看板",
          backSignup: "返回 Sign Up",
          title: "学习评估页面",
          formTitle: "基础评估信息",
          formDesc: "提交后将进入排课/选课流程。",
          level: "当前水平",
          goal: "短期目标",
          notes: "补充说明（选填）",
          submit: "提交评估",
          welcome: "欢迎你，{name}（{email}）。请完成以下评估。",
          welcomeNoUser: "欢迎来到评估环节，请完成以下评估。",
          levels: ["请选择", "初阶", "中阶", "进阶"],
          goals: ["请选择", "提分", "竞赛", "兴趣学习", "升学准备"],
          success: "评估已提交，顾问将与你确认下一步排课安排。",
          invalid: "请先完成必填评估项。"
        },
        en: {
          backFlow: "Back To Workflow",
          goTrial: "Go To Trial",
          goCourseSelection: "Course Selection",
          goCourseSystem: "View Curriculum System",
          goSemesterReport: "View Semester Report",
          goDashboard: "Go To Dashboard",
          backSignup: "Back To Sign Up",
          title: "Assessment Page",
          formTitle: "Basic Assessment Information",
          formDesc: "After submission, the workflow moves to scheduling/course selection.",
          level: "Current Level",
          goal: "Short-Term Goal",
          notes: "Additional Notes (Optional)",
          submit: "Submit Assessment",
          welcome: "Welcome, {name} ({email}). Please complete the assessment below.",
          welcomeNoUser: "Welcome to the assessment stage. Please complete the form below.",
          levels: ["Please select", "Beginner", "Intermediate", "Advanced"],
          goals: ["Please select", "Score Improvement", "Competition", "Interest Learning", "Admission Prep"],
          success: "Assessment submitted. A consultant will confirm your next scheduling step.",
          invalid: "Please complete required assessment fields first."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var levelSelect = document.getElementById("level");
      var goalSelect = document.getElementById("goal");
      var form = document.getElementById("assessmentForm");
      var result = document.getElementById("result");
      var welcomeText = document.getElementById("welcomeText");

      var params = new URLSearchParams(window.location.search);
      var name = params.get("name") || "";
      var email = params.get("email") || "";

      function buildOptions(select, options) {
        select.innerHTML = options.map(function (item, idx) {
          var selected = idx === 0 ? " selected" : "";
          return "<option value=\"" + item + "\"" + selected + ">" + item + "</option>";
        }).join("");
      }

      function setLang(lang) {
        var t = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = t.title + " | Assessment";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) {
            el.textContent = t[key];
          }
        });

        if (name || email) {
          welcomeText.textContent = t.welcome.replace("{name}", name || "Student").replace("{email}", email || "-");
        } else {
          welcomeText.textContent = t.welcomeNoUser;
        }

        buildOptions(levelSelect, t.levels);
        buildOptions(goalSelect, t.goals);

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });

        result.className = "result";
        result.textContent = "";
      }

      var saved = localStorage.getItem("minddo_lang");
      setLang(saved === "en" ? "en" : "zh-CN");

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var lang = html.getAttribute("lang") === "en" ? "en" : "zh-CN";
        var t = I18N[lang];

        var payload = {
          name: name,
          email: email,
          level: levelSelect.value,
          goal: goalSelect.value,
          notes: form.notes.value.trim(),
          createdAt: new Date().toISOString()
        };

        if (payload.level === t.levels[0] || payload.goal === t.goals[0]) {
          result.className = "result error";
          result.textContent = t.invalid;
          return;
        }

        var key = "minddo_assessments";
        var list = JSON.parse(localStorage.getItem(key) || "[]");
        list.push(payload);
        localStorage.setItem(key, JSON.stringify(list));

        form.reset();
        setLang(lang);
        result.className = "result success";
        result.textContent = t.success;
      });
    })();
  </script>
</body>
</html>
