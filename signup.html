<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | 学员注册</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg-soft: #fffaf2;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --line-strong: rgba(208, 129, 36, 0.3);
      --primary: #f0a11f;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --success: #6f8f57;
      --error: #c46a4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 208, 118, 0.16), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(179, 76, 14, 0.08), transparent 28%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 252, 247, 0.82);
      box-shadow: 0 18px 48px rgba(123, 72, 24, 0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
    }

    .brand-copy strong {
      font-size: 19px;
      color: var(--primary-deep);
    }

    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip,
    .lang-btn,
    .submit-btn,
    .oauth-btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .chip:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .submit-btn:hover,
    .oauth-btn:hover {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
      color: var(--primary-deep);
    }

    .lang-switch { display: flex; gap: 10px; }

    .hero,
    .card {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(252, 244, 232, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(123, 72, 24, 0.08);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0.02em;
      color: var(--primary-deep);
    }

    .hero p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      padding: 20px;
    }

    h2 {
      margin: 0 0 10px;
      color: var(--primary-deep);
      font-size: 20px;
    }

    h3 {
      margin: 0 0 8px;
      color: var(--primary-deep);
      font-size: 17px;
    }

    .stack { display: grid; gap: 12px; }

    .auth-section {
      display: grid;
      gap: 12px;
    }

    .oauth-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .oauth-btn {
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
    }

    .oauth-logo {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 22px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(151, 84, 21, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .oauth-logo.google {
      color: #db4437;
    }

    .oauth-logo.microsoft {
      border-radius: 6px;
      background:
        linear-gradient(90deg, #f25022 0 50%, #7fba00 50% 100%),
        linear-gradient(180deg, #00a4ef 0 50%, #ffb900 50% 100%);
      background-blend-mode: multiply;
      position: relative;
      overflow: hidden;
      font-size: 0;
    }

    .oauth-logo.microsoft::before,
    .oauth-logo.microsoft::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.92);
    }

    .oauth-logo.microsoft::before {
      width: 1px;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .oauth-logo.microsoft::after {
      height: 1px;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .oauth-logo.apple {
      color: #111111;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.96);
    }

    .oauth-label {
      display: inline-block;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9a785d;
      font-size: 12px;
      margin: 4px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(151, 84, 21, 0.12);
    }

    .section-copy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    form { display: grid; gap: 12px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #7b5b43;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(151, 84, 21, 0.16);
      background: rgba(255, 252, 247, 0.88);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(208, 129, 36, 0.54);
      box-shadow: 0 0 0 4px rgba(255, 204, 97, 0.2);
    }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .consent input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
    }

    .submit-btn {
      justify-self: start;
      min-width: 180px;
      border-radius: 14px;
    }

    .result {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 14px;
      display: none;
    }

    .result.success {
      display: block;
      border: 1px solid rgba(111, 143, 87, 0.28);
      background: rgba(111, 143, 87, 0.1);
      color: var(--success);
    }

    .result.error {
      display: block;
      border: 1px solid rgba(196, 106, 77, 0.28);
      background: rgba(196, 106, 77, 0.1);
      color: var(--error);
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .row, .oauth-row { grid-template-columns: 1fr; }
      .topbar {
        justify-content: center;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="nav-links">
        <a class="chip" href="index.html" data-i18n="backFlow"></a>
        <a class="chip" href="trial.html" data-i18n="backTrial"></a>
        <a class="chip" href="assessment.html" data-i18n="goAssessment"></a>
        <a class="chip" href="student-account.html" data-i18n="goAccount"></a>
        <a class="chip" href="course-system.html" data-i18n="goCourseSystem"></a>
        <a class="chip" href="course-selection.html" data-i18n="goCourseSelection"></a>
        <a class="chip" href="feedback.html" data-i18n="goFeedback"></a>
        <a class="chip" href="semester-report.html" data-i18n="goSemesterReport"></a>
        <a class="chip" href="dashboard.html" data-i18n="goDashboard"></a>
      </div>
      <div class="lang-switch" aria-label="language switch">
        <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
        <button class="lang-btn" type="button" data-set-lang="en">English</button>
      </div>
    </div>

    <section class="hero">
      <h1 data-i18n="pageTitle"></h1>
    </section>

    <section class="grid">
      <article class="card stack">
        <h2 data-i18n="authTitle"></h2>

        <section class="auth-section">
          <div>
            <h3 data-i18n="registerTitle"></h3>
            <p class="section-copy" data-i18n="registerIntro"></p>
          </div>

          <form id="signupForm" novalidate>
            <div class="row">
              <div>
                <label for="studentName" data-i18n="studentName"></label>
                <input id="studentName" name="studentName" type="text" required />
              </div>
              <div>
                <label for="email" data-i18n="email"></label>
                <input id="email" name="email" type="email" required />
              </div>
            </div>

            <div class="row">
              <div>
                <label for="password" data-i18n="password"></label>
                <input id="password" name="password" type="password" required />
              </div>
              <div>
                <label for="confirmPassword" data-i18n="confirmPassword"></label>
                <input id="confirmPassword" name="confirmPassword" type="password" required />
              </div>
            </div>

            <label class="consent">
              <input id="consent" name="consent" type="checkbox" required />
              <span data-i18n="consent"></span>
            </label>

            <button class="submit-btn" type="submit" data-i18n="submit"></button>
            <div id="submitResult" class="result" role="status" aria-live="polite"></div>
          </form>
        </section>

        <div class="divider" data-i18n="loginDivider"></div>

        <section class="auth-section">
          <div>
            <h3 data-i18n="loginTitle"></h3>
            <p class="section-copy" data-i18n="loginIntro"></p>
          </div>

          <form id="loginForm" novalidate>
            <div class="row">
              <div>
                <label for="loginEmail" data-i18n="email"></label>
                <input id="loginEmail" name="loginEmail" type="email" required />
              </div>
              <div>
                <label for="loginPassword" data-i18n="password"></label>
                <input id="loginPassword" name="loginPassword" type="password" required />
              </div>
            </div>

            <button class="submit-btn" type="submit" data-i18n="loginSubmit"></button>
            <div id="loginResult" class="result" role="status" aria-live="polite"></div>
          </form>
        </section>

        <div class="divider" data-i18n="or"></div>

        <div class="oauth-row">
          <button type="button" class="oauth-btn" id="googleBtn">
            <span class="oauth-logo google" aria-hidden="true">G</span>
            <span class="oauth-label" data-i18n="google"></span>
          </button>
          <button type="button" class="oauth-btn" id="microsoftBtn">
            <span class="oauth-logo microsoft" aria-hidden="true"></span>
            <span class="oauth-label" data-i18n="microsoft"></span>
          </button>
          <button type="button" class="oauth-btn" id="appleBtn">
            <span class="oauth-logo apple" aria-hidden="true">A</span>
            <span class="oauth-label" data-i18n="apple"></span>
          </button>
        </div>
      </article>
    </section>
  </main>

  <script src="assets/minddo-flow.js"></script>
  <script>
    (function () {
      var CONFIG = {
        emailApiUrl: "",
        oauth: {
          google: "",
          microsoft: "",
          apple: ""
        },
        redirectDelayMs: 1500
      };

      var I18N = {
        "zh-CN": {
          backFlow: "返回流程总览",
          goCourseSelection: "前往选课",
          goCourseSystem: "查看课程体系",
          goSemesterReport: "查看学期报告",
          goAssessment: "前往 Assessment",
          goAccount: "前往学生档案",
          goFeedback: "前往反馈",
          goDashboard: "前往看板",
          backTrial: "返回 Trial 页面",
          pageTitle: "Sign Up 注册页面",
          authTitle: "创建学员账户",
          registerTitle: "新用户注册",
          registerIntro: "首次使用时创建账户，完成后会直接进入学生档案页面。",
          loginDivider: "已有账户？直接登录",
          loginTitle: "已有账户登录",
          loginIntro: "输入已经注册过的邮箱即可进入学生页面，当前原型不强制校验真实密码。",
          or: "或使用以下方式继续",
          google: "Google",
          microsoft: "Microsoft",
          apple: "Apple",
          studentName: "学生姓名",
          email: "邮箱",
          password: "密码",
          confirmPassword: "确认密码",
          consent: "我同意接收注册成功邮件，并用于后续学习评估通知。",
          submit: "完成注册并进入学生档案",
          loginSubmit: "登录并进入学生档案",
          invalid: "请填写完整信息，且两次密码保持一致（至少6位）。",
          loginInvalid: "请输入已注册邮箱和密码。",
          loginNotFound: "未找到该账户，请先完成注册。",
          emailInvalid: "请输入有效的邮箱地址。",
          success: "注册成功，邮件已发送，正在跳转学生 profile 页面...",
          successNoEmail: "注册成功。邮件暂未发送成功，但系统会先带你进入学生档案页面。",
          oauthSuccess: "登录成功，正在发送邮件并跳转学生 profile 页面...",
          loginSuccess: "登录成功，正在进入学生档案页面...",
          failed: "注册流程失败，请稍后重试。"
        },
        en: {
          backFlow: "Back To Workflow",
          goCourseSelection: "Course Selection",
          goCourseSystem: "View Curriculum System",
          goSemesterReport: "View Semester Report",
          goAssessment: "Go To Assessment",
          goAccount: "Go To Profile",
          goFeedback: "Go To Feedback",
          goDashboard: "Go To Dashboard",
          backTrial: "Back To Trial",
          pageTitle: "Sign Up Page",
          authTitle: "Create Student Account",
          registerTitle: "New Account Registration",
          registerIntro: "Create a new account first, then the flow will open the student profile directly.",
          loginDivider: "Already have an account?",
          loginTitle: "Existing Account Login",
          loginIntro: "Use a previously registered email to enter the student page. This prototype does not enforce real password verification yet.",
          or: "or continue with",
          google: "Google",
          microsoft: "Microsoft",
          apple: "Apple",
          studentName: "Student Name",
          email: "Email",
          password: "Password",
          confirmPassword: "Confirm Password",
          consent: "I agree to receive registration confirmation emails and assessment notifications.",
          submit: "Sign Up And Open Profile",
          loginSubmit: "Log In And Open Profile",
          invalid: "Please complete all fields and keep both passwords matched (min 6 chars).",
          loginInvalid: "Please enter a registered email and password.",
          loginNotFound: "This account was not found. Please sign up first.",
          emailInvalid: "Please enter a valid email address.",
          success: "Sign-up successful. Confirmation email sent. Redirecting to student profile...",
          successNoEmail: "Sign-up successful. Email sending is unavailable right now, but we will open the student profile first.",
          oauthSuccess: "Login successful. Sending email and redirecting to student profile...",
          loginSuccess: "Login successful. Opening the student profile...",
          failed: "Sign-up flow failed. Please try again later."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var form = document.getElementById("signupForm");
      var loginForm = document.getElementById("loginForm");
      var result = document.getElementById("submitResult");
      var loginResult = document.getElementById("loginResult");
      var googleBtn = document.getElementById("googleBtn");
      var microsoftBtn = document.getElementById("microsoftBtn");
      var appleBtn = document.getElementById("appleBtn");

      function currentLang() {
        return html.getAttribute("lang") === "en" ? "en" : "zh-CN";
      }

      function setResult(kind, text) {
        result.className = "result " + kind;
        result.textContent = text;
      }

      function setLoginResult(kind, text) {
        loginResult.className = "result " + kind;
        loginResult.textContent = text;
      }

      function setLang(lang) {
        var data = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = data.pageTitle + " | Sign Up";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (data[key]) {
            el.textContent = data[key];
          }
        });

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });

        result.className = "result";
        result.textContent = "";
        loginResult.className = "result";
        loginResult.textContent = "";
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function saveUser(user) {
        if (window.MindDoFlow && window.MindDoFlow.saveSignupUser) {
          window.MindDoFlow.saveSignupUser(user);
          return;
        }
        var key = "minddo_signup_users";
        var users = JSON.parse(localStorage.getItem(key) || "[]");
        users.push(user);
        localStorage.setItem(key, JSON.stringify(users));
      }

      function findUserByEmail(email) {
        var target = String(email || "").trim().toLowerCase();
        var users = [];

        if (window.MindDoFlow && window.MindDoFlow.readJson && window.MindDoFlow.keys && window.MindDoFlow.keys.signups) {
          users = window.MindDoFlow.readJson(window.MindDoFlow.keys.signups, []);
        } else {
          users = JSON.parse(localStorage.getItem("minddo_signup_users") || "[]");
        }

        return users.find(function (user) {
          return String((user && user.email) || "").trim().toLowerCase() === target;
        }) || null;
      }

      function setCurrentStudent(user) {
        if (window.MindDoFlow && window.MindDoFlow.setCurrentStudent) {
          window.MindDoFlow.setCurrentStudent(user);
          return;
        }
        localStorage.setItem("minddo_current_student", JSON.stringify(user));
      }

      function sendRegistrationEmail(payload) {
        if (!CONFIG.emailApiUrl) {
          return Promise.resolve({ mocked: true });
        }

        return fetch(CONFIG.emailApiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }).then(function (res) {
          if (!res.ok) {
            throw new Error("Email API error");
          }
          return res.json().catch(function () { return {}; });
        });
      }

      function redirectToStudentProfile(name, email) {
        var target = "student-account.html?name=" + encodeURIComponent(name || "") + "&email=" + encodeURIComponent(email || "");
        setTimeout(function () {
          window.location.href = target;
        }, CONFIG.redirectDelayMs);
      }

      function handleOAuth(provider) {
        var data = I18N[currentLang()];
        var oauthUrl = CONFIG.oauth[provider];

        if (oauthUrl) {
          window.location.href = oauthUrl;
          return;
        }

        var fakeNameMap = {
          google: "Google User",
          microsoft: "Microsoft User",
          apple: "Apple User"
        };
        var fakeEmailMap = {
          google: "google.user@example.com",
          microsoft: "microsoft.user@example.com",
          apple: "apple.user@example.com"
        };
        var fakeName = fakeNameMap[provider] || "Social User";
        var fakeEmail = fakeEmailMap[provider] || "social.user@example.com";

        var oauthUser = {
          provider: provider,
          studentName: fakeName,
          email: fakeEmail,
          createdAt: new Date().toISOString()
        };
        saveUser(oauthUser);
        setCurrentStudent(oauthUser);

        setResult("success", data.oauthSuccess);
        sendRegistrationEmail({
          to: fakeEmail,
          name: fakeName,
          lang: currentLang(),
          source: provider
        }).catch(function () {
          // keep redirect path even if email API is unavailable
        }).finally(function () {
          redirectToStudentProfile(fakeName, fakeEmail);
        });
      }

      var savedLang = localStorage.getItem("minddo_lang");
      setLang(savedLang === "en" ? "en" : "zh-CN");
      if (window.MindDoFlow && window.MindDoFlow.prefillSignupForm) {
        window.MindDoFlow.prefillSignupForm(form);
      }

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      googleBtn.addEventListener("click", function () {
        handleOAuth("google");
      });

      microsoftBtn.addEventListener("click", function () {
        handleOAuth("microsoft");
      });

      appleBtn.addEventListener("click", function () {
        handleOAuth("apple");
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var data = I18N[currentLang()];

        var studentName = form.studentName.value.trim();
        var email = form.email.value.trim();
        var password = form.password.value;
        var confirmPassword = form.confirmPassword.value;
        var consent = form.consent.checked;

        if (!studentName || !email || !password || !confirmPassword || !consent || password.length < 6 || password !== confirmPassword) {
          setResult("error", data.invalid);
          return;
        }

        if (!isValidEmail(email)) {
          setResult("error", data.emailInvalid);
          return;
        }

        var userRecord = {
          provider: "email",
          studentName: studentName,
          email: email,
          createdAt: new Date().toISOString()
        };
        saveUser(userRecord);
        setCurrentStudent(userRecord);

        sendRegistrationEmail({
          to: email,
          name: studentName,
          lang: currentLang(),
          source: "signup-form"
        }).then(function () {
          setResult("success", data.success);
          redirectToStudentProfile(studentName, email);
        }).catch(function () {
          setResult("success", data.successNoEmail);
          redirectToStudentProfile(studentName, email);
        });
      });

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var data = I18N[currentLang()];
        var email = loginForm.loginEmail.value.trim();
        var password = loginForm.loginPassword.value;

        if (!email || !password) {
          setLoginResult("error", data.loginInvalid);
          return;
        }

        if (!isValidEmail(email)) {
          setLoginResult("error", data.emailInvalid);
          return;
        }

        var existingUser = findUserByEmail(email);
        if (!existingUser) {
          setLoginResult("error", data.loginNotFound);
          return;
        }

        setCurrentStudent({
          studentName: existingUser.studentName || existingUser.name || "",
          name: existingUser.studentName || existingUser.name || "",
          email: existingUser.email,
          provider: existingUser.provider || "email",
          studentId: existingUser.studentId
        });

        setLoginResult("success", data.loginSuccess);
        redirectToStudentProfile(existingUser.studentName || existingUser.name || "", existingUser.email);
      });
    })();
  </script>
</body>
</html>
