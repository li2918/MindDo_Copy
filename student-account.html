<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Account | 学生账户</title>
  <style>
    :root {
      --bg: #f6efe4;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --primary: #f0a11f;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --success: #6f8f57;
      --warn: #d89c36;
      --danger: #c46a4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }

    .topbar,
    .hero,
    .panel,
    .action-card,
    .module {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(252, 244, 232, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(123, 72, 24, 0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
    }

    .brand-copy strong {
      font-size: 19px;
      color: var(--primary-deep);
    }

    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }

    .toolbar,
    .lang-switch {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip,
    .lang-btn,
    .action-btn,
    .ghost-btn,
    .logout-btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .chip:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .action-btn:hover,
    .ghost-btn:hover,
    .logout-btn:hover {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
      color: var(--primary-deep);
    }

    .logout-btn {
      background: rgba(255, 241, 233, 0.92);
      color: #9d4f2f;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 18px;
      padding: 24px;
      margin-bottom: 18px;
    }

    .hero h1,
    .panel h2,
    .action-card h2,
    .module h2 {
      margin: 0 0 10px;
      color: var(--primary-deep);
    }

    .hero h1 {
      font-size: clamp(28px, 4vw, 40px);
    }

    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .hero-stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 248, 238, 0.82);
      border: 1px solid rgba(151, 84, 21, 0.12);
    }

    .hero-stat span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .hero-stat strong {
      color: var(--primary-deep);
      font-size: 18px;
    }

    .hero-side {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .status-banner {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 243, 214, 0.95), rgba(255, 250, 241, 0.95));
      border: 1px solid rgba(208, 129, 36, 0.2);
    }

    .status-banner strong {
      display: block;
      margin-bottom: 6px;
      color: var(--primary-deep);
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .panel,
    .action-card,
    .module {
      padding: 20px;
    }

    .profile-list,
    .summary-list,
    .status-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .profile-list li,
    .summary-list li,
    .status-list li {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 248, 238, 0.8);
      border: 1px solid rgba(151, 84, 21, 0.12);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(240, 161, 31, 0.12);
      color: var(--primary-deep);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .action-card p,
    .module p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .action-row,
    .module .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status {
      color: var(--success);
      font-weight: 700;
    }

    .status.warn {
      color: var(--warn);
    }

    .status.danger {
      color: var(--danger);
    }

    .empty-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .schedule-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .schedule-list li {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 248, 238, 0.8);
      border: 1px solid rgba(151, 84, 21, 0.12);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .day-card {
      min-height: 132px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 248, 238, 0.72);
      border: 1px solid rgba(151, 84, 21, 0.12);
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .day-card.active {
      background: linear-gradient(180deg, rgba(255, 242, 208, 0.96), rgba(255, 249, 236, 0.96));
      border-color: rgba(208, 129, 36, 0.28);
      box-shadow: 0 14px 28px rgba(192, 123, 39, 0.12);
    }

    .day-name {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .day-title {
      font-size: 15px;
      color: var(--primary-deep);
      font-weight: 700;
    }

    .day-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(151, 84, 21, 0.12);
      color: var(--primary-deep);
      font-size: 12px;
      font-weight: 700;
    }

    .slot-stack {
      display: grid;
      gap: 8px;
    }

    .slot-chip {
      display: grid;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(151, 84, 21, 0.12);
    }

    .slot-chip strong {
      color: var(--primary-deep);
      font-size: 12px;
      line-height: 1.4;
    }

    .slot-chip span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .day-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .hero,
      .layout,
      .schedule-grid {
        grid-template-columns: 1fr;
      }
      .week-board {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .container { padding: 22px 14px 38px; }
      .topbar { justify-content: center; }
      .hero-meta,
      .action-grid {
        grid-template-columns: 1fr;
      }
      .week-board {
        grid-template-columns: 1fr 1fr;
      }
      .schedule-list li {
        flex-direction: column;
        align-items: flex-start;
      }
      .profile-list li,
      .summary-list li,
      .status-list li {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">

        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="toolbar">
        <a class="chip" href="index.html" data-i18n="backFlow"></a>
        <a class="chip" href="assessment.html" data-i18n="goAssessment"></a>
        <a class="chip" href="course-selection.html" data-i18n="goCourseSelection"></a>
        <button class="logout-btn" type="button" id="logoutBtn" data-i18n="logout"></button>
        <div class="lang-switch">
          <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
          <button class="lang-btn" type="button" data-set-lang="en">English</button>
        </div>
      </div>
    </div>

    <section class="hero">
      <div>
        <h1 id="heroTitle"></h1>
        <p class="muted" data-i18n="heroIntro"></p>
        <div class="hero-meta">
          <div class="hero-stat">
            <span data-i18n="heroStudentId"></span>
            <strong id="heroStudentIdValue"></strong>
          </div>
          <div class="hero-stat">
            <span data-i18n="heroGoal"></span>
            <strong id="heroGoalValue"></strong>
          </div>
          <div class="hero-stat">
            <span data-i18n="heroStage"></span>
            <strong id="heroStageValue"></strong>
          </div>
        </div>
      </div>
      <div class="hero-side">
        <div class="status-banner">
          <strong data-i18n="statusBannerTitle"></strong>
          <p class="muted" id="statusBannerText"></p>
        </div>
        <div class="action-row">
          <a class="action-btn" href="course-selection.html" data-i18n="openCourseSelection"></a>
          <a class="ghost-btn" href="feedback.html" data-i18n="openFeedback"></a>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="stack">
        <article class="panel">
          <h2 data-i18n="profileTitle"></h2>
          <ul class="profile-list" id="profileList"></ul>
        </article>

        <article class="panel">
          <h2 data-i18n="summaryTitle"></h2>
          <ul class="summary-list" id="summaryList"></ul>
        </article>
      </div>

      <div class="stack">
        <article class="panel">
          <h2 data-i18n="statusTitle"></h2>
          <ul class="status-list" id="statusList"></ul>
        </article>

        <article class="panel">
          <h2 data-i18n="quickActionsTitle"></h2>
          <div class="action-grid">
            <article class="action-card">
              <span class="tag" data-i18n="profileTag"></span>
              <h2 data-i18n="profileCardTitle"></h2>
              <p data-i18n="profileCardCopy"></p>
              <div class="action-row">
                <a class="action-btn" href="#top" data-i18n="viewProfile"></a>
              </div>
            </article>

            <article class="action-card">
              <span class="tag" data-i18n="courseTag"></span>
              <h2 data-i18n="courseTitle"></h2>
              <p data-i18n="courseCopy"></p>
              <div class="action-row">
                <a class="action-btn" href="course-selection.html" data-i18n="openCourseSelection"></a>
              </div>
            </article>

            <article class="action-card">
              <span class="tag" data-i18n="assessmentTag"></span>
              <h2 data-i18n="assessmentTitle"></h2>
              <p data-i18n="assessmentCopy"></p>
              <div class="action-row">
                <a class="action-btn" href="assessment.html" data-i18n="openAssessment"></a>
              </div>
            </article>

            <article class="action-card">
              <span class="tag" data-i18n="feedbackTag"></span>
              <h2 data-i18n="feedbackTitle"></h2>
              <p data-i18n="feedbackCopy"></p>
              <div class="action-row">
                <a class="action-btn" href="feedback.html" data-i18n="openFeedback"></a>
              </div>
            </article>
          </div>
        </article>
      </div>
    </section>

    <section class="layout">
      <article class="module">
        <span class="tag" data-i18n="trialTag"></span>
        <h2 data-i18n="trialTitle"></h2>
        <p data-i18n="trialCopy"></p>
        <div class="actions">
          <a class="action-btn" href="trial.html" data-i18n="openTrial"></a>
        </div>
      </article>

      <article class="module">
        <span class="tag" data-i18n="logoutTag"></span>
        <h2 data-i18n="logoutTitle"></h2>
        <p data-i18n="logoutCopy"></p>
        <div class="actions">
          <button class="logout-btn" type="button" id="logoutBtnBottom" data-i18n="logout"></button>
        </div>
      </article>
    </section>

    <section class="schedule-grid">
      <article class="panel">
        <h2 data-i18n="myCourseTitle"></h2>
        <ul class="schedule-list" id="courseList"></ul>
      </article>

      <article class="panel">
        <h2 data-i18n="myScheduleTitle"></h2>
        <ul class="schedule-list" id="scheduleList"></ul>
        <div class="week-board" id="weekBoard"></div>
      </article>
    </section>
  </main>

            hasAssessment: "An assessment record exists and the course step can continue.",
            noFeedback: "Feedback has not been submitted yet.",
            hasFeedback: "Feedback has already been submitted."
          },
          stageMap: {
            start: "Not Started",
            trial: "Trial",
            assessment: "Assessment",
            signup: "Signup",
            payment: "Payment",
            membership: "Scheduling",
            feedback: "Feedback"
          },
          defaultGoal: "AI Learning Growth",
          loggedOut: "You have logged out. Returning to the login page."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var profileList = document.getElementById("profileList");
      var summaryList = document.getElementById("summaryList");
      var statusList = document.getElementById("statusList");
      var courseList = document.getElementById("courseList");
      var scheduleList = document.getElementById("scheduleList");
      var weekBoard = document.getElementById("weekBoard");
      var heroTitle = document.getElementById("heroTitle");
      var heroStudentIdValue = document.getElementById("heroStudentIdValue");
      var heroGoalValue = document.getElementById("heroGoalValue");
      var heroStageValue = document.getElementById("heroStageValue");
      var statusBannerText = document.getElementById("statusBannerText");
      var logoutButtons = [document.getElementById("logoutBtn"), document.getElementById("logoutBtnBottom")];

      function readJson(key) {
        try {
          return JSON.parse(localStorage.getItem(key) || "[]");
        } catch (_) {
          return [];
        }
      }

      function latestByDate(list) {
        return list.slice().sort(function (a, b) {
          return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        })[0] || null;
      }

      function matchCurrentStudent(item, current) {
        if (!item || !current) return false;
        var itemEmail = String(item.email || "").trim().toLowerCase();
        var currentEmail = String(current.email || "").trim().toLowerCase();
        var itemName = String(item.studentName || item.name || "").trim().toLowerCase();
        var currentName = String(current.studentName || current.name || "").trim().toLowerCase();
        return (itemEmail && currentEmail && itemEmail === currentEmail) || (itemName && currentName && itemName === currentName);
      }

      function formatTrialTime(lead) {
        if (!lead || !lead.trialDate || !lead.trialTime) return "";
        return lead.trialDate + " " + lead.trialTime;
      }

      function titleCaseProvider(provider) {
        var raw = String(provider || "").toLowerCase();
        if (!raw) return "";
        if (raw === "google") return "Google";
        if (raw === "microsoft") return "Microsoft";
        if (raw === "apple") return "Apple";
        return raw.charAt(0).toUpperCase() + raw.slice(1);
      }

      function formatPlan(plan, lang) {
        var v = String(plan || "").toLowerCase();
        if (v === "weekly1") return lang === "en" ? "1 Class / Week" : "每周一节课";
        if (v === "weekly2") return lang === "en" ? "2 Classes / Week" : "每周两节课";
        if (v === "weekly3") return lang === "en" ? "3 Classes / Week" : "每周三节课";
        return "";
      }

      function formatAddons(addons, lang) {
        var list = Array.isArray(addons) ? addons : [];
        if (!list.length) return "";
        var map = {
          mentor: lang === "en" ? "Mentor Coaching" : "学业导师加餐",
          project: lang === "en" ? "Project Studio" : "项目工坊",
          report: lang === "en" ? "Parent Deep Report" : "家长深度报告"
        };
        return list.map(function (item) { return map[item] || item; }).join(", ");
      }

      function formatClassMode(mode, lang) {
        if (!mode) return "";
        if (mode === "1v1") return "1v1";
        if (mode === "small") return lang === "en" ? "Small Group 1v4" : "小组课 1v4";
        return mode;
      }

      function uniqueByText(list) {
        var seen = {};
        return list.filter(function (item) {
          var key = String(item || "");
          if (!key || seen[key]) return false;
          seen[key] = true;
          return true;
        });
      }

      function getWeekDays(lang) {
        if (lang === "en") {
          return [
            { key: "Monday", short: "Mon" },
            { key: "Tuesday", short: "Tue" },
            { key: "Wednesday", short: "Wed" },
            { key: "Thursday", short: "Thu" },
            { key: "Friday", short: "Fri" },
            { key: "Saturday", short: "Sat" },
            { key: "Sunday", short: "Sun" }
          ];
        }
        return [
          { key: "周一", short: "Mon" },
          { key: "周二", short: "Tue" },
          { key: "周三", short: "Wed" },
          { key: "周四", short: "Thu" },
          { key: "周五", short: "Fri" },
          { key: "周六", short: "Sat" },
          { key: "周日", short: "Sun" }
        ];
      }

      function matchesDay(source, day) {
        var value = String(source || "").toLowerCase();
        var target = String(day || "").toLowerCase();
        if (!value || !target) return false;
        return value === target;
      }

      function syncCurrentStudentFromQuery() {
        var params = new URLSearchParams(window.location.search);
        var name = params.get("name") || "";
        var email = params.get("email") || "";
        if (!name && !email) return;

        if (window.MindDoFlow && window.MindDoFlow.setCurrentStudent) {
          window.MindDoFlow.setCurrentStudent({
            studentName: name,
            name: name,
            email: email
          });
          return;
        }

        try {
          var current = JSON.parse(localStorage.getItem("minddo_current_student") || "{}");
          localStorage.setItem("minddo_current_student", JSON.stringify(Object.assign({}, current, {
            studentName: name || current.studentName || current.name || "",
            name: name || current.name || current.studentName || "",
            email: email || current.email || ""
          })));
        } catch (_) {}
      }

      function getStage(snapshot) {
        if (window.MindDoFlow && window.MindDoFlow.getStage) {
          return window.MindDoFlow.getStage(snapshot);
        }
        return "start";
      }

      function render(lang) {
        var t = I18N[lang] || I18N["zh-CN"];
        syncCurrentStudentFromQuery();

        var snapshot = window.MindDoFlow && window.MindDoFlow.getSnapshot
          ? window.MindDoFlow.getSnapshot()
          : null;
        var current = snapshot && snapshot.currentStudent ? snapshot.currentStudent : {};
        var latestLead = snapshot && snapshot.lead ? snapshot.lead : latestByDate(readJson("minddo_trial_leads"));
        var latestAssessment = snapshot && snapshot.assessment ? snapshot.assessment : latestByDate(readJson("minddo_assessments"));
        var latestFeedback = snapshot && snapshot.feedback ? snapshot.feedback : latestByDate(readJson("minddo_feedback"));
        var latestMembership = snapshot && snapshot.membership ? snapshot.membership : latestByDate(readJson("minddo_membership_orders"));
        var memberships = readJson("minddo_membership_orders")
          .filter(function (item) { return matchCurrentStudent(item, current); })
          .sort(function (a, b) { return new Date(b.createdAt || 0) - new Date(a.createdAt || 0); });
        var stage = getStage(snapshot);

        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = t.title + " | MindDo";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });

        heroTitle.textContent = (current.studentName || current.name || t.profileItems[0].fallback) + " · " + t.title;
        heroStudentIdValue.textContent = current.studentId || t.profileItems[2].fallback;
        heroGoalValue.textContent = (latestAssessment && latestAssessment.goal) || current.goal || t.defaultGoal;
        heroStageValue.textContent = (t.stageMap && t.stageMap[stage]) || stage;

        statusBannerText.textContent = latestFeedback
          ? t.statusItems.hasFeedback
          : latestAssessment
            ? t.statusItems.hasAssessment
            : latestLead
              ? t.statusItems.hasTrial
              : t.statusItems.noTrial;

        var profileValues = [
          current.studentName || current.name || t.profileItems[0].fallback,
          current.email || t.profileItems[1].fallback,
          current.studentId || t.profileItems[2].fallback,
          titleCaseProvider(current.provider) || t.profileItems[3].fallback,
          current.parentName || t.profileItems[4].fallback,
          current.city || t.profileItems[5].fallback
        ];

        profileList.innerHTML = t.profileItems.map(function (item, index) {
          return "<li><span>" + item.label + "</span><strong>" + profileValues[index] + "</strong></li>";
        }).join("");

        var assessmentLevel = latestAssessment
          ? (latestAssessment.level || latestAssessment.quizScore || t.summaryItems[2].fallback)
          : t.summaryItems[2].fallback;

        var summaryValues = [
          latestLead ? (latestLead.subjectLabel || latestLead.subject || t.summaryItems[0].fallback) : t.summaryItems[0].fallback,
          latestLead ? (formatTrialTime(latestLead) || t.summaryItems[1].fallback) : t.summaryItems[1].fallback,
          assessmentLevel,
          latestFeedback ? (latestFeedback.rating ? latestFeedback.rating + "" : t.summaryItems[3].fallback) : t.summaryItems[3].fallback
        ];

        summaryList.innerHTML = t.summaryItems.map(function (item, index) {
          return "<li><span>" + item.label + "</span><strong>" + summaryValues[index] + "</strong></li>";
        }).join("");

        var coursePlans = uniqueByText(memberships.map(function (item) {
          return formatPlan(item.plan, lang);
        }).filter(Boolean));
        var classModes = uniqueByText(memberships.map(function (item) {
          return formatClassMode(item.classMode, lang);
        }).filter(Boolean));
        var billingCycles = uniqueByText(memberships.map(function (item) {
          return item.billingCycle || "";
        }).filter(Boolean));

        var courseValues = [
          coursePlans.length ? coursePlans.join(" / ") : (latestMembership ? (formatPlan(latestMembership.plan, lang) || t.courseItems[0].fallback) : t.courseItems[0].fallback),
          classModes.length ? classModes.join(" / ") : (latestMembership ? (formatClassMode(latestMembership.classMode, lang) || t.courseItems[1].fallback) : t.courseItems[1].fallback),
          billingCycles.length ? billingCycles.join(" / ") : (latestMembership ? (latestMembership.billingCycle || t.courseItems[2].fallback) : t.courseItems[2].fallback)
        ];

        courseList.innerHTML = t.courseItems.map(function (item, index) {
          return "<li><span>" + item.label + "</span><strong>" + courseValues[index] + "</strong></li>";
        }).join("");

        var scheduleDays = uniqueByText(memberships.map(function (item) {
          return item.weekday || "";
        }).filter(Boolean));
        var scheduleTimes = uniqueByText(memberships.map(function (item) {
          return item.timeSlot || "";
        }).filter(Boolean));
        var scheduleAddons = uniqueByText(memberships.map(function (item) {
          return formatAddons(item.addons, lang);
        }).filter(Boolean));

        var scheduleValues = [
          scheduleDays.length ? scheduleDays.join(" / ") : (latestMembership ? (latestMembership.weekday || t.scheduleItems[0].fallback) : t.scheduleItems[0].fallback),
          scheduleTimes.length ? scheduleTimes.join(" / ") : (latestMembership ? (latestMembership.timeSlot || t.scheduleItems[1].fallback) : t.scheduleItems[1].fallback),
          scheduleAddons.length ? scheduleAddons.join(" / ") : (latestMembership ? (formatAddons(latestMembership.addons, lang) || t.scheduleItems[2].fallback) : t.scheduleItems[2].fallback)
        ];

        scheduleList.innerHTML = t.scheduleItems.map(function (item, index) {
          return "<li><span>" + item.label + "</span><strong>" + scheduleValues[index] + "</strong></li>";
        }).join("");

        var days = getWeekDays(lang);
        weekBoard.innerHTML = days.map(function (day) {
          var dayMemberships = memberships.filter(function (item) {
            return matchesDay(item.weekday, day.key);
          });
          var isActive = dayMemberships.length > 0;
          var slotMarkup = dayMemberships.length
            ? "<div class='slot-stack'>" + dayMemberships.map(function (item) {
                var title = formatPlan(item.plan, lang) || t.courseItems[0].fallback;
                var meta = [item.timeSlot || "", formatClassMode(item.classMode, lang) || ""].filter(Boolean).join(" · ");
                return "<div class='slot-chip'><strong>" + title + "</strong><span>" + meta + "</span></div>";
              }).join("") + "</div>"
            : "<div class='day-empty'>" + t.scheduleItems[1].fallback + "</div>";
          return [
            "<article class='day-card" + (isActive ? " active" : "") + "'>",
            "<div class='day-name'>" + day.short + "</div>",
            "<div class='day-title'>" + day.key + "</div>",
            slotMarkup,
            "</article>"
          ].join("");
        }).join("");

        var statuses = [
          latestLead ? { text: t.statusItems.hasTrial, cls: "status" } : { text: t.statusItems.noTrial, cls: "status warn" },
          latestAssessment ? { text: t.statusItems.hasAssessment, cls: "status" } : { text: t.statusItems.noAssessment, cls: "status warn" },
          latestFeedback ? { text: t.statusItems.hasFeedback, cls: "status" } : { text: t.statusItems.noFeedback, cls: "status warn" }
        ];

        statusList.innerHTML = statuses.map(function (item) {
          return "<li><span>" + item.text + "</span><span class='" + item.cls + "'>OK</span></li>";
        }).join("");

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });
      }

      function logout() {
        var lang = html.getAttribute("lang") === "en" ? "en" : "zh-CN";
        var t = I18N[lang];
        localStorage.removeItem("minddo_current_student");
        alert(t.loggedOut);
        window.location.href = "signup.html";
      }

      var saved = localStorage.getItem("minddo_lang");
      render(saved === "en" ? "en" : "zh-CN");

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          render(btn.getAttribute("data-set-lang"));
        });
      });

      logoutButtons.forEach(function (btn) {
        if (!btn) return;
        btn.addEventListener("click", logout);
      });
    })();
  </script>
</body>
</html>
