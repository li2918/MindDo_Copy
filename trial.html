<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>试课报名 | Trial Registration</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg-soft: #fffaf2;
      --card: rgba(255, 250, 242, 0.94);
      --line: rgba(151, 84, 21, 0.14);
      --line-strong: rgba(208, 129, 36, 0.3);
      --primary: #f0a11f;
      --primary-deep: #8c3d14;
      --text: #4f2410;
      --muted: #8b6e58;
      --success: #6f8f57;
      --error: #c46a4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 204, 97, 0.3), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(244, 162, 38, 0.14), transparent 24%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 208, 118, 0.16), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(179, 76, 14, 0.08), transparent 28%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 252, 247, 0.82);
      box-shadow: 0 18px 48px rgba(123, 72, 24, 0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
    }

    .brand-copy strong {
      font-size: 19px;
      color: var(--primary-deep);
    }

    .brand-copy span {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aa6a2b;
    }

    .nav-links,
    .lang-switch {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn,
    .lang-btn,
    .submit-btn {
      border: 1px solid var(--line);
      background: rgba(255, 247, 236, 0.96);
      color: var(--primary-deep);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .link-btn:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .submit-btn:hover {
      background: linear-gradient(135deg, #fff6de, #ffd977);
      border-color: rgba(208, 129, 36, 0.5);
      box-shadow: 0 10px 24px rgba(192, 123, 39, 0.18);
      color: var(--primary-deep);
    }

    .hero,
    .card {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(252, 244, 232, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(123, 72, 24, 0.08);
    }

    .hero {
      padding: 24px;
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0.02em;
      color: var(--primary-deep);
    }

    .hero p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
    }

    .card {
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 10px;
      color: var(--primary-deep);
      font-size: 20px;
    }

    .highlight-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .highlight-list li {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(151, 84, 21, 0.12);
      background: rgba(255, 248, 238, 0.72);
      color: #6a4a35;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      border-radius: 14px;
      border: 1px solid rgba(151, 84, 21, 0.12);
      background: rgba(255, 248, 238, 0.84);
      padding: 10px;
    }

    .metric strong {
      display: block;
      color: var(--primary-deep);
      margin-bottom: 4px;
    }

    form { display: grid; gap: 12px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #7b5b43;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(151, 84, 21, 0.16);
      background: rgba(255, 252, 247, 0.88);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(208, 129, 36, 0.54);
      box-shadow: 0 0 0 4px rgba(255, 204, 97, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 92px;
    }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .consent input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
    }

    .submit-btn {
      justify-self: start;
      min-width: 180px;
    }

    .result {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 14px;
      margin-top: 2px;
      display: none;
    }

    .result.success {
      display: block;
      border: 1px solid rgba(111, 143, 87, 0.28);
      background: rgba(111, 143, 87, 0.1);
      color: var(--success);
    }

    .result.error {
      display: block;
      border: 1px solid rgba(196, 106, 77, 0.28);
      background: rgba(196, 106, 77, 0.1);
      color: var(--error);
    }

    @media (max-width: 900px) {
      .grid,
      .metrics {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .row { grid-template-columns: 1fr; }
      .topbar {
        justify-content: center;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="MindDo home">
        <img src="assets/logo.png" alt="Mindo AI logo" />
        <div class="brand-copy">
          <span>Mindo AI</span>
          <strong>Mindo AI</strong>
        </div>
      </a>
      <div class="nav-links">
        <a class="link-btn" href="index.html" data-i18n="backFlow"></a>
        <a class="link-btn" href="course-selection.html" data-i18n="goCourseSelection"></a>
        <a class="link-btn" href="course-system.html" data-i18n="goCourseSystem"></a>
        <a class="link-btn" href="semester-report.html" data-i18n="goSemesterReport"></a>
        <a class="link-btn" href="student-account.html" data-i18n="goAccount"></a>
        <a class="link-btn" href="feedback.html" data-i18n="goFeedback"></a>
        <a class="link-btn" href="assessment.html" data-i18n="goAssessment"></a>
        <a class="link-btn" href="dashboard.html" data-i18n="goDashboard"></a>
        <a class="link-btn" href="signup.html" data-i18n="goSignup"></a>
      </div>
      <div class="lang-switch">
        <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
        <button class="lang-btn" type="button" data-set-lang="en">English</button>
      </div>
    </div>
    <section class="hero">
      <h1 data-i18n="pageTitle"></h1>
      <p data-i18n="pageDesc"></p>
    </section>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="leftTitle"></h2>
        <p class="muted" data-i18n="leftDesc"></p>
        <ul class="highlight-list" id="highlightList"></ul>

        <div class="metrics" id="metrics"></div>
      </article>

      <article class="card">
        <h2 data-i18n="formTitle"></h2>
        <p class="muted" data-i18n="formDesc"></p>

        <form id="trialForm" novalidate>
          <div class="row">
            <div>
              <label for="studentName" data-i18n="studentName"></label>
              <input id="studentName" name="studentName" type="text" required />
            </div>
            <div>
              <label for="grade" data-i18n="grade"></label>
              <input id="grade" name="grade" type="text" required />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="parentName" data-i18n="parentName"></label>
              <input id="parentName" name="parentName" type="text" required />
            </div>
            <div>
              <label for="phone" data-i18n="phone"></label>
              <input id="phone" name="phone" type="tel" required />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="city" data-i18n="city"></label>
              <input id="city" name="city" type="text" required />
            </div>
            <div>
              <label for="subject" data-i18n="subject"></label>
              <select id="subject" name="subject" required></select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="trialDate" data-i18n="trialDate"></label>
              <input id="trialDate" name="trialDate" type="date" required />
            </div>
            <div>
              <label for="trialTime" data-i18n="trialTime"></label>
              <select id="trialTime" name="trialTime" required></select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="channel" data-i18n="channel"></label>
              <select id="channel" name="channel" required></select>
            </div>
            <div>
              <label for="timeNote" data-i18n="timeNote"></label>
              <input id="timeNote" name="timeNote" type="text" data-i18n-placeholder="timeNotePlaceholder" />
            </div>
          </div>

          <div>
            <label for="goal" data-i18n="goal"></label>
            <textarea id="goal" name="goal"></textarea>
          </div>

          <label class="consent" for="consent">
            <input id="consent" name="consent" type="checkbox" required />
            <span data-i18n="consent"></span>
          </label>

          <button class="submit-btn" type="submit" data-i18n="submit"></button>
          <div id="submitResult" class="result" role="status" aria-live="polite"></div>
        </form>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var I18N = {
        "zh-CN": {

          ],

          ],

          studentName: "学生姓名",

          parentName: "家长姓名",

          subject: "意向科目",
          trialDate: "试课日期",
          trialTime: "试课时间",

          submit: "提交 Trial 报名",
          subjectOptions: [
            { value: "", label: "请选择" },
            { value: "ai", label: "AI启蒙" },
            { value: "programming", label: "编程" },

            { value: "english", label: "英语" },

          ],
          trialTimeOptions: [

            { value: "15:00", label: "15:00" },

            { value: "17:00", label: "17:00" },

          ],
          channelOptions: [

            { value: "douyin", label: "抖音" },
            { value: "xiaohongshu", label: "小红书" },
            { value: "official-account", label: "公众号" },

            { value: "offline-event", label: "线下活动" }
          ],
          success: "报名已提交，顾问将在24小时内联系并确认试课时间。",
          error: "请完整填写必填项，并确认联系电话格式正确且试课时间晚于当前时间。"
        },
        en: {
          backFlow: "Back To Workflow",
          backToFlow: "Back To Workflow",
          goCourseSelection: "Course Selection",
          goCourseSystem: "View Curriculum System",
          goSemesterReport: "View Semester Report",
          goAccount: "Student Account",
          goFeedback: "Feedback Page",
          goAssessment: "Go To Assessment",
          goDashboard: "Go To Dashboard",
          goSignup: "Go To Sign Up",
          pageTitle: "Trial Registration Page",
          pageDesc: "As the starting point of the workflow, this page captures leads and student registrations before trial-class scheduling.",
          leftTitle: "Why Start With Trial",
          leftDesc: "A standardized registration flow helps us segment leads, match courses, and trigger consultant follow-up faster.",
          highlights: [
            "Collect student profile and goals in one entry point.",
            "Store high-intent leads for conversion actions.",
            "Connect sales and academic ops with a traceable first-touch loop."
          ],
          metrics: [
            { value: "24h", label: "First Follow-Up SLA" },
            { value: "90%+", label: "Target Form Completeness" },
            { value: "T+1", label: "Target Trial Scheduling" }
          ],
          formTitle: "Student Registration",
          formDesc: "Students can directly choose a preferred trial date and time before the consultant confirms it.",
          studentName: "Student Name",
          grade: "Grade / Stage",
          parentName: "Parent Name",
          phone: "Phone Number",
          city: "City",
          subject: "Interested Subject",
          trialDate: "Trial Date",
          trialTime: "Trial Time",
          channel: "Lead Source",
          timeNote: "Time Note (Optional)",
          timeNotePlaceholder: "Example: Available after school / Avoid Wednesdays",
          goal: "Learning Goal (Optional)",
          consent: "I agree to be contacted and have my information recorded for consultation and trial scheduling.",
          submit: "Submit Trial Registration",
          subjectOptions: [
            { value: "", label: "Please select" },
            { value: "ai", label: "AI Fundamentals" },
            { value: "programming", label: "Programming" },
            { value: "math", label: "Mathematics" },
            { value: "english", label: "English" },
            { value: "competency", label: "General Competency" }
          ],
          trialTimeOptions: [
            { value: "", label: "Please select" },
            { value: "15:00", label: "15:00" },
            { value: "16:00", label: "16:00" },
            { value: "17:00", label: "17:00" },
            { value: "18:00", label: "18:00" },
            { value: "19:00", label: "19:00" },
            { value: "20:00", label: "20:00" },
            { value: "21:00", label: "21:00" }
          ],
          channelOptions: [
            { value: "", label: "Please select" },
            { value: "douyin", label: "Douyin" },
            { value: "xiaohongshu", label: "Xiaohongshu" },
            { value: "official-account", label: "Official Account" },
            { value: "referral", label: "Referral" },
            { value: "offline-event", label: "Offline Event" }
          ],
          success: "Registration submitted. A consultant will contact you within 24 hours to confirm the trial time.",
          error: "Please complete required fields, provide a valid phone number, and choose a future trial time."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var form = document.getElementById("trialForm");
      var result = document.getElementById("submitResult");
      var highlightList = document.getElementById("highlightList");
      var metrics = document.getElementById("metrics");
      var subject = document.getElementById("subject");
      var trialDate = document.getElementById("trialDate");
      var trialTime = document.getElementById("trialTime");
      var channel = document.getElementById("channel");

      function buildOptions(select, options) {
        select.innerHTML = options
          .map(function (item, idx) {
            var value = typeof item === "string" ? item : item.value;
            var label = typeof item === "string" ? item : item.label;
            var selected = idx === 0 && !select.value ? " selected" : "";
            var active = select.value === value ? " selected" : selected;
            return "<option value=\"" + value + "\"" + active + ">" + label + "</option>";
          })
          .join("");
      }

      function syncTranslatedFields(data) {
        var subjectLabel = (data.subjectOptions.find(function (item) { return item.value === subject.value; }) || {}).label || "";
        var trialTimeLabel = (data.trialTimeOptions.find(function (item) { return item.value === trialTime.value; }) || {}).label || "";
        var channelLabel = (data.channelOptions.find(function (item) { return item.value === channel.value; }) || {}).label || "";

        form.subject.dataset.label = subjectLabel;
        form.trialTime.dataset.label = trialTimeLabel;
        form.channel.dataset.label = channelLabel;
      }

      function setMinTrialDate() {
        var now = new Date();
        var minDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().split("T")[0];
        trialDate.min = minDate;
      }

      function isFutureTrial(dateValue, timeValue) {
        if (!dateValue || !timeValue) return false;
        var chosen = new Date(dateValue + "T" + timeValue + ":00");
        return !Number.isNaN(chosen.getTime()) && chosen.getTime() > Date.now();
      }

      function setLang(lang) {
        var data = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = data.pageTitle + " | Trial";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (data[key]) {
            el.textContent = data[key];
          }
        });

        document.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
          var key = el.getAttribute("data-i18n-placeholder");
          if (data[key]) {
            el.setAttribute("placeholder", data[key]);
          }
        });

        highlightList.innerHTML = data.highlights
          .map(function (item) {
            return "<li>" + item + "</li>";
          })
          .join("");

        metrics.innerHTML = data.metrics
          .map(function (item) {
            return "<div class=\"metric\"><strong>" + item.value + "</strong><span>" + item.label + "</span></div>";
          })
          .join("");

        buildOptions(subject, data.subjectOptions);
        buildOptions(trialTime, data.trialTimeOptions);
        buildOptions(channel, data.channelOptions);
        syncTranslatedFields(data);

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });

        result.className = "result";
        result.textContent = "";
      }

      function isValidPhone(phone) {
        return /^[0-9+\-\s()]{6,20}$/.test(phone);
      }

      function saveLead(data) {
        var key = "minddo_trial_leads";
        var leads = JSON.parse(localStorage.getItem(key) || "[]");
        leads.push(data);
        localStorage.setItem(key, JSON.stringify(leads));
      }

      var saved = localStorage.getItem("minddo_lang");
      var initialLang = saved === "en" ? "en" : "zh-CN";
      setMinTrialDate();
      setLang(initialLang);

      [subject, trialTime, channel].forEach(function (field) {
        field.addEventListener("change", function () {
          var lang = html.getAttribute("lang") === "en" ? "en" : "zh-CN";
          syncTranslatedFields(I18N[lang]);
        });
      });

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        var currentLang = html.getAttribute("lang") === "en" ? "en" : "zh-CN";
        var t = I18N[currentLang];

        var formData = {
          studentName: form.studentName.value.trim(),
          grade: form.grade.value.trim(),
          parentName: form.parentName.value.trim(),
          phone: form.phone.value.trim(),
          city: form.city.value.trim(),
          subject: form.subject.value,
          subjectLabel: form.subject.dataset.label || "",
          trialDate: form.trialDate.value,
          trialTime: form.trialTime.value,
          trialTimeLabel: form.trialTime.dataset.label || form.trialTime.value,
          preferredTrialDateTime: form.trialDate.value && form.trialTime.value
            ? new Date(form.trialDate.value + "T" + form.trialTime.value + ":00").toISOString()
            : "",
          channel: form.channel.value,
          channelLabel: form.channel.dataset.label || "",
          timeNote: form.timeNote.value.trim(),
          goal: form.goal.value.trim(),
          consent: form.consent.checked,
          createdAt: new Date().toISOString()
        };

        var hasRequired =
          formData.studentName &&
          formData.grade &&
          formData.parentName &&
          formData.phone &&
          formData.city &&
          formData.subject &&
          formData.trialDate &&
          formData.trialTime &&
          formData.channel &&
          formData.consent;

        if (!hasRequired || !isValidPhone(formData.phone) || !isFutureTrial(formData.trialDate, formData.trialTime)) {
          result.className = "result error";
          result.textContent = t.error;
          return;
        }

        saveLead(formData);
        form.reset();
        setLang(currentLang);
        result.className = "result success";
        result.textContent = t.success;
      });
    })();
  </script>
</body>
</html>
