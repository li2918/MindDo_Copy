<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment | 学习评估</title>
  <style>
    :root {
      --bg: #05070c;
      --bg-2: #0a1222;
      --card: rgba(12, 18, 32, 0.72);
      --line: rgba(0, 255, 247, 0.25);
      --text: #e7f4ff;
      --muted: #97adc9;
      --success: #5bffa4;
      --error: #ff7a8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(63, 123, 255, 0.2), transparent 40%),
        radial-gradient(circle at 86% 90%, rgba(0, 246, 255, 0.16), transparent 42%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 255, 247, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 247, 0.07) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 34px 20px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .chip,
    .lang-btn,
    .submit-btn {
      border: 1px solid rgba(0, 246, 255, 0.35);
      background: rgba(0, 246, 255, 0.08);
      color: #bdfdff;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .chip:hover,
    .lang-btn:hover,
    .lang-btn.active,
    .submit-btn:hover {
      background: rgba(0, 246, 255, 0.2);
      color: #ecfeff;
      box-shadow: 0 0 12px rgba(0, 246, 255, 0.3);
    }

    .lang-switch { display: flex; gap: 10px; }

    .hero,
    .card {
      background: linear-gradient(160deg, rgba(16, 28, 48, 0.86), rgba(8, 14, 25, 0.88));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow:
        inset 0 0 24px rgba(0, 246, 255, 0.08),
        0 16px 40px rgba(0, 0, 0, 0.5);
      padding: 22px;
    }

    .hero { margin-bottom: 16px; }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 34px);
      text-shadow: 0 0 12px rgba(0, 246, 255, 0.35);
    }

    h2 {
      margin: 0 0 10px;
      color: #d2ecff;
      font-size: 20px;
    }

    p { margin: 0; }
    .muted { color: var(--muted); line-height: 1.6; }

    form { display: grid; gap: 12px; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #c5dbef;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(0, 246, 255, 0.25);
      background: rgba(3, 10, 20, 0.7);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    textarea { min-height: 90px; resize: vertical; }

    .result {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      display: none;
    }

    .result.success {
      display: block;
      border: 1px solid rgba(91, 255, 164, 0.4);
      background: rgba(91, 255, 164, 0.1);
      color: var(--success);
    }

    .result.error {
      display: block;
      border: 1px solid rgba(255, 122, 138, 0.4);
      background: rgba(255, 122, 138, 0.1);
      color: var(--error);
    }

    @media (max-width: 640px) {
      .container { padding: 22px 14px 38px; }
      .row { grid-template-columns: 1fr; }
      .topbar { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="chip" href="signup.html" data-i18n="backSignup"></a>
      <div class="lang-switch">
        <button class="lang-btn" type="button" data-set-lang="zh-CN">中文</button>
        <button class="lang-btn" type="button" data-set-lang="en">English</button>
      </div>
    </div>

    <section class="hero">
      <h1 data-i18n="title"></h1>
      <p class="muted" id="welcomeText"></p>
    </section>

    <section class="card">
      <h2 data-i18n="formTitle"></h2>
      <p class="muted" data-i18n="formDesc"></p>

      <form id="assessmentForm" novalidate>
        <div class="row">
          <div>
            <label for="level" data-i18n="level"></label>
            <select id="level" name="level" required></select>
          </div>
          <div>
            <label for="goal" data-i18n="goal"></label>
            <select id="goal" name="goal" required></select>
          </div>
        </div>

        <div>
          <label for="notes" data-i18n="notes"></label>
          <textarea id="notes" name="notes"></textarea>
        </div>

        <button class="submit-btn" type="submit" data-i18n="submit"></button>
        <div id="result" class="result" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var I18N = {
        "zh-CN": {
          backSignup: "返回 Sign Up",
          title: "学习评估页面",
          formTitle: "基础评估信息",
          formDesc: "提交后将进入排课/选课流程。",
          level: "当前水平",
          goal: "短期目标",
          notes: "补充说明（选填）",
          submit: "提交评估",
          welcome: "欢迎你，{name}（{email}）。请完成以下评估。",
          welcomeNoUser: "欢迎来到评估环节，请完成以下评估。",
          levels: ["请选择", "初阶", "中阶", "进阶"],
          goals: ["请选择", "提分", "竞赛", "兴趣学习", "升学准备"],
          success: "评估已提交，顾问将与你确认下一步排课安排。",
          invalid: "请先完成必填评估项。"
        },
        en: {
          backSignup: "Back To Sign Up",
          title: "Assessment Page",
          formTitle: "Basic Assessment Information",
          formDesc: "After submission, the workflow moves to scheduling/course selection.",
          level: "Current Level",
          goal: "Short-Term Goal",
          notes: "Additional Notes (Optional)",
          submit: "Submit Assessment",
          welcome: "Welcome, {name} ({email}). Please complete the assessment below.",
          welcomeNoUser: "Welcome to the assessment stage. Please complete the form below.",
          levels: ["Please select", "Beginner", "Intermediate", "Advanced"],
          goals: ["Please select", "Score Improvement", "Competition", "Interest Learning", "Admission Prep"],
          success: "Assessment submitted. A consultant will confirm your next scheduling step.",
          invalid: "Please complete required assessment fields first."
        }
      };

      var html = document.documentElement;
      var buttons = document.querySelectorAll("[data-set-lang]");
      var levelSelect = document.getElementById("level");
      var goalSelect = document.getElementById("goal");
      var form = document.getElementById("assessmentForm");
      var result = document.getElementById("result");
      var welcomeText = document.getElementById("welcomeText");

      var params = new URLSearchParams(window.location.search);
      var name = params.get("name") || "";
      var email = params.get("email") || "";

      function buildOptions(select, options) {
        select.innerHTML = options.map(function (item, idx) {
          var selected = idx === 0 ? " selected" : "";
          return "<option value=\"" + item + "\"" + selected + ">" + item + "</option>";
        }).join("");
      }

      function setLang(lang) {
        var t = I18N[lang] || I18N["zh-CN"];
        html.setAttribute("lang", lang);
        localStorage.setItem("minddo_lang", lang);
        document.title = t.title + " | Assessment";

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) {
            el.textContent = t[key];
          }
        });

        if (name || email) {
          welcomeText.textContent = t.welcome.replace("{name}", name || "Student").replace("{email}", email || "-");
        } else {
          welcomeText.textContent = t.welcomeNoUser;
        }

        buildOptions(levelSelect, t.levels);
        buildOptions(goalSelect, t.goals);

        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
        });

        result.className = "result";
        result.textContent = "";
      }

      var saved = localStorage.getItem("minddo_lang");
      setLang(saved === "en" ? "en" : "zh-CN");

      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          setLang(btn.getAttribute("data-set-lang"));
        });
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var lang = html.getAttribute("lang") === "en" ? "en" : "zh-CN";
        var t = I18N[lang];

        var payload = {
          name: name,
          email: email,
          level: levelSelect.value,
          goal: goalSelect.value,
          notes: form.notes.value.trim(),
          createdAt: new Date().toISOString()
        };

        if (payload.level === t.levels[0] || payload.goal === t.goals[0]) {
          result.className = "result error";
          result.textContent = t.invalid;
          return;
        }

        var key = "minddo_assessments";
        var list = JSON.parse(localStorage.getItem(key) || "[]");
        list.push(payload);
        localStorage.setItem(key, JSON.stringify(list));

        form.reset();
        setLang(lang);
        result.className = "result success";
        result.textContent = t.success;
      });
    })();
  </script>
</body>
</html>
